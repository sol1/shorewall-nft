description = "Shorewall6 two-interfaces sample. IPv6, no NAT, RFC 4890 ICMPv6."
family = 6

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "fd00:2::2/64"
node_b = "fw"
dev_b = "eth0"
addr_b = "fd00:2::1/64"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "fd00:1::2/64"
node_b = "fw"
dev_b = "eth1"
addr_b = "fd00:1::1/64"

[routes]
server = "fd00:2::1"
client = "fd00:1::1"

[[probes]]
id = "client-to-server-tcp80"
from = "client"
to = "server"
addr = "fd00:2::2"
proto = "tcp"
port = 80
expect = "allow"
peer = "fd00:1::2"

[[probes]]
id = "client-to-server-ping"
from = "client"
to = "server"
addr = "fd00:2::2"
proto = "icmp"
expect = "allow"

[[probes]]
id = "server-to-client-tcp80"
from = "server"
to = "client"
addr = "fd00:1::2"
proto = "tcp"
port = 80
expect = "drop"

[[probes]]
id = "server-to-fw-ping"
from = "server"
to = "fw"
addr = "fd00:2::1"
proto = "icmp"
expect = "drop"

[[probes]]
id = "client-to-fw-tcp22"
from = "client"
to = "fw"
addr = "fd00:1::1"
proto = "tcp"
port = 22
expect = "allow"
