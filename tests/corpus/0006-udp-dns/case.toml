description = "Two-interfaces plus DNS accepted from net to the firewall. UDP probes."
family = 4

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.0.2.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.2.1/24"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "10.0.1.2/24"
node_b = "fw"
dev_b = "eth1"
addr_b = "10.0.1.1/24"

[routes]
server = "10.0.2.1"
client = "10.0.1.1"

[[probes]]
id = "server-to-fw-udp53"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "udp"
port = 53
expect = "allow"

[[probes]]
id = "server-to-fw-tcp53"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "tcp"
port = 53
expect = "allow"

[[probes]]
id = "server-to-fw-udp123"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "udp"
port = 123
expect = "drop"

[[probes]]
id = "client-to-server-udp53"
from = "client"
to = "server"
addr = "10.0.2.2"
proto = "udp"
port = 53
expect = "allow"
peer = "10.0.2.1"
