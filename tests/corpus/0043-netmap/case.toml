description = "Legacy IPv4 NETMAP file compiles unchanged as stateful nft prefix NAT."
family = 4
no_upstream = true

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.10.10.27/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.10.10.1/24"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "192.168.1.4/24"
node_b = "fw"
dev_b = "eth1"
addr_b = "192.168.1.1/24"

[routes]
server = "10.10.10.1"
client = "192.168.1.1"

[[probes]]
id = "ipv4-host-bits-preserved"
from = "client"
to = "server"
addr = "10.10.10.27"
proto = "tcp"
port = 80
expect = "allow"
peer = "10.10.11.4"
