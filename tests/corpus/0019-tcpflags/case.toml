description = "tcpflags check: crafted bad-flag TCP segments dropped, normal SYN passes. Interface option is on by default."
family = 4

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.0.2.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.2.1/24"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "10.0.1.2/24"
node_b = "fw"
dev_b = "eth1"
addr_b = "10.0.1.1/24"

[routes]
server = "10.0.2.1"
client = "10.0.1.1"

[[probes]]
id = "normal-syn-to-fw"
proto = "rawtcp"
from = "server"
to = "fw"
addr = "10.0.2.1"
port = 8080
source = "10.0.2.2"
flags = "0x02"
expect = "arrived"

[[probes]]
id = "xmas-flags-to-fw"
proto = "rawtcp"
from = "server"
to = "fw"
addr = "10.0.2.1"
port = 8080
source = "10.0.2.2"
flags = "0x29"
expect = "drop"

[[probes]]
id = "null-flags-to-fw"
proto = "rawtcp"
from = "server"
to = "fw"
addr = "10.0.2.1"
port = 8080
source = "10.0.2.2"
flags = "0x00"
expect = "drop"

[[probes]]
id = "synfin-to-fw"
proto = "rawtcp"
from = "server"
to = "fw"
addr = "10.0.2.1"
port = 8080
source = "10.0.2.2"
flags = "0x03"
expect = "drop"
