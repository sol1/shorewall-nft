description = "Bidirectional NTPbi macro. The reverse rule must pierce the net-to-loc drop policy."
family = 4

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.0.2.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.2.1/24"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "10.0.1.2/24"
node_b = "fw"
dev_b = "eth1"
addr_b = "10.0.1.1/24"

[routes]
server = "10.0.2.1"
client = "10.0.1.1"

[[probes]]
id = "server-to-client-udp123"
from = "server"
to = "client"
addr = "10.0.1.2"
proto = "udp"
port = 123
expect = "allow"
peer = "10.0.2.2"

[[probes]]
id = "server-to-client-udp124"
from = "server"
to = "client"
addr = "10.0.1.2"
proto = "udp"
port = 124
expect = "drop"

[[probes]]
id = "client-to-server-udp123"
from = "client"
to = "server"
addr = "10.0.2.2"
proto = "udp"
port = 123
expect = "allow"
peer = "10.0.2.1"
