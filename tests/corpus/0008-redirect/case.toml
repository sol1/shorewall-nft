description = "Transparent redirect. loc web traffic intercepted to firewall port 8080."
family = 4

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.0.2.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.2.1/24"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "10.0.1.2/24"
node_b = "fw"
dev_b = "eth1"
addr_b = "10.0.1.1/24"

[routes]
server = "10.0.2.1"
client = "10.0.1.1"

[[probes]]
id = "client-web-intercepted"
from = "client"
to = "fw"
addr = "10.0.2.2"
proto = "tcp"
port = 80
listen_port = 8080
expect = "allow"
peer = "10.0.1.2"

[[probes]]
id = "client-to-server-443"
from = "client"
to = "server"
addr = "10.0.2.2"
proto = "tcp"
port = 443
expect = "allow"
peer = "10.0.2.1"
