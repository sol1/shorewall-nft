description = "Two-interfaces sample. loc to net accepted and masqueraded, net dropped."
family = 4

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.0.2.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.2.1/24"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "10.0.1.2/24"
node_b = "fw"
dev_b = "eth1"
addr_b = "10.0.1.1/24"

[routes]
server = "10.0.2.1"
client = "10.0.1.1"

[[probes]]
id = "client-to-server-tcp80"
from = "client"
to = "server"
addr = "10.0.2.2"
proto = "tcp"
port = 80
expect = "allow"
peer = "10.0.2.1"

[[probes]]
id = "client-to-server-ping"
from = "client"
to = "server"
addr = "10.0.2.2"
proto = "icmp"
expect = "allow"

[[probes]]
id = "server-to-client-tcp80"
from = "server"
to = "client"
addr = "10.0.1.2"
proto = "tcp"
port = 80
expect = "drop"

[[probes]]
id = "server-to-fw-ping"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "icmp"
expect = "drop"

[[probes]]
id = "client-to-fw-tcp22"
from = "client"
to = "fw"
addr = "10.0.1.1"
proto = "tcp"
port = 22
expect = "allow"
