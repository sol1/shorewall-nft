description = "One-interface sample. Outbound open, inbound all dropped, ping dropped."
family = 4

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.0.2.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.2.1/24"

[routes]
server = "10.0.2.1"

[[probes]]
id = "fw-to-server-tcp80"
from = "fw"
to = "server"
addr = "10.0.2.2"
proto = "tcp"
port = 80
expect = "allow"

[[probes]]
id = "fw-to-server-ping"
from = "fw"
to = "server"
addr = "10.0.2.2"
proto = "icmp"
expect = "allow"

[[probes]]
id = "server-to-fw-tcp22"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "tcp"
port = 22
expect = "drop"

[[probes]]
id = "server-to-fw-ping"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "icmp"
expect = "drop"
