description = "An externally-filled ipset remains populated through stop and start, not just reload. A knock daemon fills +knoc_ssh, then stop snapshots and restores it into the stopped-state table automatically. The subsequent start must retain the entry without an explicit savesets command. Ours-verified; nft sets are ours-specific runtime state."
family = 4
mode = "script"
no_upstream = true

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "10.0.1.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.1.1/24"

# Empty set: the knock has not happened, SSH is blocked.
[[probes]]
id = "knock-closed"
from = "client"
to = "fw"
addr = "10.0.1.1"
proto = "tcp"
port = 22
expect = "drop"

# The knock daemon adds the client to the nft set directly.
[[events]]
description = "knock: add the client to the set"
exec = "nft add element ip shorewall knoc_ssh { 10.0.1.2 }"
[[events.probes]]
id = "knock-open"
from = "client"
to = "fw"
addr = "10.0.1.1"
proto = "tcp"
port = 22
expect = "allow"

# Stop the firewall. Its drop policy still blocks SSH, but the dynamic set
# remains populated in the stopped-state table.
[[events]]
description = "stop"
run = "stop"
[[events.probes]]
id = "stopped"
from = "client"
to = "fw"
addr = "10.0.1.1"
proto = "tcp"
port = 22
expect = "drop"

# Start again. The snapshot must be reloaded, so the knocked-in client is
# still allowed with no second knock.
[[events]]
description = "start"
run = "start"
[[events.probes]]
id = "survives-coldstart"
from = "client"
to = "fw"
addr = "10.0.1.1"
proto = "tcp"
port = 22
expect = "allow"
