description = "DNS/REDIRECT, a macro applied as a nat action. The DNS macro supplies udp and tcp 53; REDIRECT sends loc's DNS to the firewall's port 53. Diffed against upstream."
family = 4

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.0.2.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.2.1/24"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "10.0.1.2/24"
node_b = "fw"
dev_b = "eth1"
addr_b = "10.0.1.1/24"

[routes]
server = "10.0.2.1"
client = "10.0.1.1"

[[probes]]
id = "loc-dns-redirected-to-fw"
from = "client"
to = "fw"
addr = "10.0.2.2"
proto = "tcp"
port = 53
listen_port = 53
expect = "allow"
peer = "10.0.1.2"

[[probes]]
id = "loc-https-passes-through"
from = "client"
to = "server"
addr = "10.0.2.2"
proto = "tcp"
port = 443
expect = "allow"
peer = "10.0.2.1"
