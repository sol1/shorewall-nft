description = "Address-qualified rules and per-rule log levels."
family = 4

[[links]]
node_a = "server"
dev_a = "s0"
addr_a = "10.0.2.2/24"
node_b = "fw"
dev_b = "eth0"
addr_b = "10.0.2.1/24"

[[links]]
node_a = "client"
dev_a = "c0"
addr_a = "10.0.1.2/24"
node_b = "fw"
dev_b = "eth1"
addr_b = "10.0.1.1/24"

[routes]
server = "10.0.2.1"
client = "10.0.1.1"

[[probes]]
id = "server-matching-addr-8443"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "tcp"
port = 8443
expect = "allow"

[[probes]]
id = "server-nonmatching-addr-8444"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "tcp"
port = 8444
expect = "drop"

[[probes]]
id = "server-logged-reject-8446"
from = "server"
to = "fw"
addr = "10.0.2.1"
proto = "tcp"
port = 8446
expect = "reject"

[[probes]]
id = "client-to-server-tcp80"
from = "client"
to = "server"
addr = "10.0.2.2"
proto = "tcp"
port = 80
expect = "allow"
peer = "10.0.2.1"
