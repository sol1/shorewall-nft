name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Differential test suite
    # 22.04 allows unprivileged user namespaces out of the box. Its
    # Python is 3.10, so the harness uses the tomli backport for the
    # tomllib it would get on 3.11+.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables iptables git perl python3-tomli

      - name: Clone upstream Shorewall for the differential comparison
        run: git clone --depth 1 https://gitlab.com/shorewall/code upstream/shorewall

      - name: Run the suite
        run: tests/run

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/results/
