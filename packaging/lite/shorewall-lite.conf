# Shorewall Lite configuration. The compiled firewall script carries the
# ruleset; these are the runtime knobs for the dispatcher. See docs/lite.md.

# Dispatcher verbosity: 0 quiet, 1 normal, 2 verbose.
VERBOSITY=1

# Where the dispatcher keeps its own log. Empty means it does not.
LOGFILE=

# PATH for the runtime. Empty uses /usr/sbin:/sbin:/usr/bin:/bin.
PATH=

# Directory holding the deployed firewall script and runtime state. Defaults
# to /var/lib/shorewall-lite (or shorewall6-lite). Uncomment to move it.
# VARDIR=/var/lib/shorewall-lite
